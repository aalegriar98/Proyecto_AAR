<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Préstamo</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'gestion/styles.css' %}">
</head>
<body>
    <h1>Eliminar Préstamo</h1>

    <form method="POST">
        {% csrf_token %}
        <p>¿Seguro que deseas eliminar este préstamo?</p>
        <p><strong>{{ prestamo }}</strong></p>

        <button type="submit">Sí, eliminar</button>
        <a href="{% url 'listar_prestamos' %}">Cancelar</a>
    </form>
</body>
</html>
