<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Listado de Usuarios</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'gestion/styles.css' %}">
</head>
<body>
    <h1>Listado de Usuarios</h1>

    <table>
        <tr>
            <th>Nombre</th>
            <th>Correo</th>
            <th>Teléfono</th>
            <th>Área</th>
            <th>Rol</th>
            <th>Acción</th>
        </tr>

        {% for usuario in usuarios %}
        <tr>
            <td>{{ usuario.nombre }}</td>
            <td>{{ usuario.correo }}</td>
            <td>{{ usuario.telefono }}</td>
            <td>{{ usuario.area }}</td>
            <td>{{ usuario.id_rol }}</td>
            <td>
                <a href="{% url 'editar_usuario' usuario.id_usuario %}">Editar</a>
            </td>
        </tr>
        {% endfor %}
    </table>

    <a href="{% url 'inicio' %}">Volver al inicio</a>
</body>
</html>
